<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>今日访问链接</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent: #2563eb;
      --bg: #e9ecf2;
      --card: #ffffff;
      --border: #d5d9e2;
      --text: #0f172a;
      --text2: #475569;
      --text3: #64748b;
      --surface: #f1f3f8;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 56px 16px 80px;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      font-size: 14px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    .wrapper { width: 680px; max-width: 92vw; }

    /* ── Card ── */
    .card {
      position: relative;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 1px 3px rgba(0,0,0,.04), 0 4px 20px rgba(0,0,0,.06);
      animation: cardIn .5s ease-out backwards;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card::before {
      content: '';
      display: block;
      height: 3px;
      background: linear-gradient(90deg, #2563eb, #3b82f6, #06b6d4);
    }

    /* shimmer 扫光 — 仅 transform，不触发重绘 */
    .card::after {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 30%; height: 3px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.5), transparent);
      animation: scan 3s ease-in-out infinite;
      pointer-events: none;
      z-index: 2;
    }

    @keyframes scan {
      0%   { transform: translateX(-30%); }
      100% { transform: translateX(340%); }
    }

    /* ── Header ── */
    .card-header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 24px 28px 20px;
    }

    .card-header .sys-mark {
      width: 44px; height: 44px;
      border-radius: 10px;
      background: linear-gradient(135deg, #2563eb, #3b82f6);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 800;
      letter-spacing: -.02em;
      flex-shrink: 0;
      box-shadow: 0 4px 12px rgba(37,99,235,.25);
    }

    .card-header .sys-title-group {
      line-height: 1.25;
    }

    .card-header .sys-title {
      font-size: 16px;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -.01em;
    }

    .card-header .sys-title .accent {
      color: #2563eb;
    }

    .card-header .sys-sub {
      font-size: 11px;
      color: var(--text3);
      font-weight: 500;
      font-family: "SF Mono", "Fira Code", "Consolas", monospace;
    }

    .card-header .live-tag {
      margin-left: auto;
      display: flex; align-items: center; gap: 5px;
      font-size: 11px; font-weight: 600;
      color: #059669;
      background: #ecfdf5;
      padding: 4px 12px;
      border: 1px solid #a7f3d0;
      border-radius: 4px;
    }

    .live-tag .ring {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: #10b981;
      animation: blink 3s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: .3; }
    }

    /* ── 分割线 ── */
    .divider {
      height: 1px;
      background: #e9ecf2;
      margin: 0 28px;
    }

    /* ── Token 条 ── */
    .token-strip {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 20px 28px;
    }

    .token-strip .ts-left {
      flex: 1;
      min-width: 0;
    }

    .token-strip .ts-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: .05em;
      margin-bottom: 6px;
    }

    .token-strip .ts-value {
      font-family: "SF Mono", "Fira Code", "Consolas", monospace;
      font-size: 16px;
      font-weight: 700;
      color: #1e293b;
      user-select: all;
      cursor: pointer;
      background: var(--surface);
      padding: 6px 14px;
      border-radius: 6px;
      border: 1px solid #dde0e8;
      display: inline-block;
      transition: border-color .12s, background .12s;
    }

    .token-strip .ts-value:hover {
      border-color: var(--accent);
      background: #eef2ff;
    }

    .token-strip .ts-meta {
      display: flex;
      gap: 10px;
      flex-shrink: 0;
    }

    .token-strip .ts-badge {
      text-align: center;
      background: var(--surface);
      border: 1px solid #e5e7ec;
      border-radius: 8px;
      padding: 10px 16px;
      box-shadow: 0 1px 2px rgba(0,0,0,.03);
      min-width: 88px;
    }

    .token-strip .ts-badge .bd-val {
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
    }

    .token-strip .ts-badge .bd-label {
      font-size: 10px;
      font-weight: 500;
      color: var(--text3);
      margin-top: 2px;
    }

    /* ── 端点标题 ── */
    .ep-head {
      padding: 18px 28px 6px;
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
    }

    /* ── 端点列表 ── */
    .ep-list {
      padding: 10px 28px 24px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .ep-card {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px 20px;
      background: #f4f5f9;
      border: 1px solid #dfe2ea;
      border-radius: 10px;
      cursor: pointer;
      box-shadow: 0 1px 2px rgba(0,0,0,.03);
      transition: border-color .12s, background .12s, transform .18s ease, box-shadow .12s;
      animation: rowIn .4s ease-out backwards;
    }

    .ep-card:hover {
      border-color: #bcc0cd;
      background: #eff1f6;
      box-shadow: 0 2px 8px rgba(0,0,0,.06);
    }

    @keyframes rowIn {
      from { opacity: 0; transform: translateX(-8px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    .ep-card:hover .ep-icon {
      transform: scale(1.06);
    }

    .ep-card:active {
      transform: scale(.97);
      transition: transform .08s ease;
    }

    /* 复制成功弹跳 */
    .ep-card.copied {
      border-color: #93c5fd;
      background: #eff6ff;
      animation: popIn .3s ease;
    }

    @keyframes popIn {
      0%   { transform: scale(1); }
      40%  { transform: scale(.96); }
      70%  { transform: scale(1.02); }
      100% { transform: scale(1); }
    }

    .ep-card .ep-icon {
      height: 34px;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: .03em;
      padding: 0 16px;
      flex-shrink: 0;
      transition: transform .18s ease;
    }

    .ep-card .ep-body {
      flex: 1;
      min-width: 0;
    }

    .ep-card .ep-link {
      font-family: "SF Mono", "Fira Code", "Consolas", monospace;
      font-size: 11px;
      color: #64748b;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .ep-card .ep-hint {
      flex-shrink: 0;
      font-size: 11px;
      font-weight: 600;
      color: var(--accent);
      opacity: 0;
      transition: opacity .12s, transform .12s ease;
    }

    .ep-card:hover .ep-hint {
      opacity: 1;
      animation: arrowNudge .5s ease-in-out;
    }

    @keyframes arrowNudge {
      0%, 100% { transform: translateX(0); }
      50%      { transform: translateX(3px); }
    }

    .ep-card.copied .ep-hint {
      color: var(--accent);
      opacity: 1;
      animation: none;
      transform: scale(1.08);
      transition: transform .2s ease;
    }

    /* ── Footer ── */
    .card-foot {
      padding: 12px 28px;
      border-top: 1px solid #e9ecf2;
      font-size: 11px;
      color: var(--text3);
      font-weight: 500;
      display: flex; align-items: center; gap: 8px;
    }

    .card-foot .pipe { color: #c4c8d2; }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: #0f172a;
      color: #fff;
      padding: 10px 24px;
      border-radius: 6px;
      font-size: 13px;
      transition: transform .25s cubic-bezier(.16,1,.3,1);
      z-index: 100;
      pointer-events: none;
    }

    .toast.show { transform: translateX(-50%) translateY(0); }

    @media (max-width: 560px) {
      body { padding: 28px 10px 60px; }
      .card-header { padding: 16px 18px 14px; flex-wrap: wrap; }
      .token-strip { padding: 14px 18px; flex-wrap: wrap; gap: 12px; }
      .divider { margin: 0 18px; }
      .ep-head { padding: 14px 18px 4px; }
      .ep-list { padding: 8px 18px 18px; }
      .ep-card { padding: 14px 16px; }
      .ep-card .ep-hint { opacity: 1; }
    }
  </style>
</head>
<body>

<div class="wrapper">

  <div class="card">

    <div class="card-header">
      <div class="sys-mark">AI</div>
      <div class="sys-title-group">
        <div class="sys-title"><span class="accent">智能客服 Demo</span>  访问链接</div>
        <div class="sys-sub" id="todayLabel"></div>
      </div>
      <div class="live-tag"><span class="ring"></span> 已就绪</div>
    </div>

    <div class="divider"></div>

    <div class="token-strip">
      <div class="ts-left">
        <div class="ts-label">Token</div>
        <span class="ts-value" id="todayToken" onclick="copyTokenValue()" title="点击复制 Token"></span>
      </div>
      <div class="ts-meta">
        <div class="ts-badge">
          <div class="bd-val" id="todayDate"></div>
          <div class="bd-label">日期</div>
        </div>
        <div class="ts-badge">
          <div class="bd-val">全天</div>
          <div class="bd-label">有效期</div>
        </div>
      </div>
    </div>

    <div class="divider"></div>

    <div class="ep-head">访问入口</div>

    <div class="ep-list" id="epList"></div>

    <div class="card-foot">
      点击卡片复制链接<span class="pipe">|</span>可分享给外部访问者<span class="pipe">|</span>每日零点自动轮换
    </div>

  </div>
</div>

<div class="toast" id="toast">已复制到剪贴板</div>

<script>
  var SECRET_KEY = 'aiceo-shanghai-2026';
  var TENANTS = [
    { name: '智能客服', color: '#2563eb', bg: '#eef2ff', domain: 'smart_cs_demo.astrakairos.com' },
  ];

  function sha256(str) {
    function rr(v,a){return(v>>>a)|(v<<(32-a))}
    var mw=Math.pow(2,32),i,j,r='',w=[],abl=str.length*8,h=[],k=[],pc=0;
    var ic={};
    for(var c=2;pc<64;c++){if(!ic[c]){for(i=0;i<313;i+=c)ic[i]=c;h[pc]=(Math.pow(c,.5)*mw)|0;k[pc++]=(Math.pow(c,1/3)*mw)|0}}
    str+='\x80';while(str.length%64-56)str+='\x00';
    for(i=0;i<str.length;i++){j=str.charCodeAt(i);if(j>>8)return;w[i>>2]|=j<<((3-i)%4)*8}
    w[w.length]=(abl/mw)|0;w[w.length]=abl;
    for(j=0;j<w.length;){var wk=w.slice(j,j+=16),oh=h;h=h.slice(0,8);
      for(i=0;i<64;i++){var w15=wk[i-15],w2=wk[i-2],a=h[0],e=h[4];
        var t1=h[7]+(rr(e,6)^rr(e,11)^rr(e,25))+((e&h[5])^((~e)&h[6]))+k[i]+(wk[i]=(i<16)?wk[i]:(wk[i-16]+(rr(w15,7)^rr(w15,18)^(w15>>>3))+wk[i-7]+(rr(w2,17)^rr(w2,19)^(w2>>>10)))|0);
        var t2=(rr(a,2)^rr(a,13)^rr(a,22))+((a&h[1])^(a&h[2])^(h[1]&h[2]));
        h=[(t1+t2)|0].concat(h);h[4]=(h[4]+t1)|0}
      for(i=0;i<8;i++)h[i]=(h[i]+oh[i])|0}
    for(i=0;i<8;i++)for(j=3;j+1;j--){var b=(h[i]>>(j*8))&255;r+=(b<16?'0':'')+b.toString(16)}
    return r;
  }

  function localDate() {
    var d = new Date();
    return d.getFullYear() + '-' +
      String(d.getMonth() + 1).padStart(2, '0') + '-' +
      String(d.getDate()).padStart(2, '0');
  }

  function generateDailyToken() {
    var today = localDate();
    return { token: sha256(today + SECRET_KEY).slice(0, 16), date: today };
  }

  function copyTokenValue() {
    var el = document.getElementById('todayToken');
    copyToClipboard(el.textContent).then(function() {
      var orig = el.textContent;
      el.textContent = '✓ 已复制';
      el.style.color = '#2563eb';
      el.style.borderColor = '#93c5fd';
      el.style.background = '#eff6ff';
      showToast();
      setTimeout(function() {
        el.textContent = orig;
        el.style.color = '';
        el.style.borderColor = '';
        el.style.background = '';
      }, 1500);
    });
  }

  function copyToClipboard(text) {
    return new Promise(function(resolve) {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(resolve).catch(function(){
          var ta = document.createElement('textarea');
          ta.value = text; ta.style.position = 'fixed'; ta.style.left = '-9999px';
          document.body.appendChild(ta); ta.select();
          document.execCommand('copy'); document.body.removeChild(ta);
          resolve();
        });
      } else {
        var ta = document.createElement('textarea');
        ta.value = text; ta.style.position = 'fixed'; ta.style.left = '-9999px';
        document.body.appendChild(ta); ta.select();
        document.execCommand('copy'); document.body.removeChild(ta);
        resolve();
      }
    });
  }

  function init() {
    var tk = generateDailyToken();
    document.getElementById('todayToken').textContent = tk.token;
    document.getElementById('todayLabel').textContent = tk.date;
    document.getElementById('todayDate').textContent = tk.date;

    var html = '';
    for (var i = 0; i < TENANTS.length; i++) {
      var t = TENANTS[i];
      var link = 'http://' + t.domain + '/smart-cs-demo/?token=' + tk.token;
      html +=
        '<div class="ep-card" style="animation-delay:' + (i * .08) + 's" data-link="' + link.replace(/"/g, '&quot;') + '" onclick="copyCard(this)" title="点击复制链接">'
        + '<div class="ep-icon" style="background:' + t.bg + ';color:' + t.color + '">' + t.name + '</div>'
        + '<div class="ep-body">'
        + '<div class="ep-link">' + link + '</div>'
        + '</div>'
        + '<span class="ep-hint">点击复制 →</span>'
        + '</div>';
    }
    document.getElementById('epList').innerHTML = html;
  }

  function copyCard(el) {
    var link = el.getAttribute('data-link');
    copyToClipboard(link).then(function() {
      el.classList.add('copied');
      var hint = el.querySelector('.ep-hint');
      hint.textContent = '✓ 已复制';
      showToast();
      setTimeout(function() {
        el.classList.remove('copied');
        hint.textContent = '点击复制 →';
      }, 1500);
    });
  }

  function showToast() {
    var t = document.getElementById('toast');
    t.classList.add('show');
    setTimeout(function() { t.classList.remove('show'); }, 1500);
  }

  init();
</script>
</body>
</html>
